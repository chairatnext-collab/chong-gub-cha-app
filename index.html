<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>บันทึกออเดอร์ชงกับชา</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ชงกับชา">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e3a8a">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: linear-gradient(160deg, #0f1f3d 0%, #1e3a8a 55%, #2563eb 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "Segoe UI", Roboto, "Sarabun", sans-serif;
  overflow: hidden;
  position: relative;
}
body::before {
  content: "";
  position: absolute;
  top: -120px;
  right: -100px;
  width: 320px;
  height: 320px;
  background: radial-gradient(circle, rgba(249,115,22,0.55) 0%, rgba(249,115,22,0) 70%);
  pointer-events: none;
}
body::after {
  content: "";
  position: absolute;
  bottom: -140px;
  left: -100px;
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(249,115,22,0.35) 0%, rgba(249,115,22,0) 70%);
  pointer-events: none;
}
.wrap {
  position: relative;
  z-index: 1;
  text-align: center;
  color: #f1f5f9;
  padding: 36px 28px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  backdrop-filter: blur(6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  max-width: 320px;
}
.icon-frame {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 88px;
  height: 88px;
  border-radius: 22px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  box-shadow: 0 10px 24px rgba(234,88,12,0.45);
  margin-bottom: 18px;
}
img {
  width: 64px;
  height: 64px;
  border-radius: 16px;
}
h1 {
  font-size: 18px;
  font-weight: 700;
  margin: 0 0 8px;
  color: #ffffff;
}
p {
  font-size: 14px;
  opacity: 0.88;
  line-height: 1.6;
  margin: 0;
}
.spinner {
  width: 22px;
  height: 22px;
  border: 3px solid rgba(255,255,255,0.25);
  border-top-color: #f97316;
  border-radius: 50%;
  margin: 16px auto 0;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
button {
  margin-top: 18px;
  padding: 12px 30px;
  font-size: 16px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: #ffffff;
  font-weight: 700;
  box-shadow: 0 10px 22px rgba(234,88,12,0.4);
  cursor: pointer;
}
button:active {
  transform: translateY(1px);
}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon-frame">
    <img src="icon-192.png" alt="">
  </div>
  <h1>ชงกับชา</h1>
  <p id="msg">กำลังเปิดแอป...</p>
  <div class="spinner" id="spinner"></div>
  <button id="openBtn" style="display:none">เปิดแอป</button>
</div>
<noscript>
<p style="color:#f1f5f9">เปิด JavaScript เพื่อใช้งานแอป หรือ
<a style="color:#fb923c" href="https://script.google.com/macros/s/AKfycbwtGF0VbeW1NE-GP71mILa-AMTXHVDZdRtQrRS11mH5kyYkwbqJvjoOnbzW-uRLV3oP/exec">คลิกที่นี่</a>
</p>
</noscript>
<script>
var APP_URL = "https://script.google.com/macros/s/AKfycbwtGF0VbeW1NE-GP71mILa-AMTXHVDZdRtQrRS11mH5kyYkwbqJvjoOnbzW-uRLV3oP/exec";

if (window.navigator.standalone) {
  window.location.replace(APP_URL);
} else {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('msg').textContent = 'กด Share แล้วเลือก "เพิ่มไปยังหน้าจอโฮม" เพื่อติดตั้งไอคอน หรือแตะปุ่มด้านล่างเพื่อเปิดแอปตอนนี้';
  var btn = document.getElementById('openBtn');
  btn.style.display = 'inline-block';
  btn.onclick = function () { window.location.href = APP_URL; };
}
</script>
</body>
</html>
