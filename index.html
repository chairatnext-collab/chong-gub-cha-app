<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>บันทึกออเดอร์ชงกับชา</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ชงกับชา">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, "Segoe UI", Roboto, "Sarabun", sans-serif;
}
.wrap {
  text-align: center;
  color: #f1f5f9;
  padding: 24px;
}
img {
  width: 72px;
  height: 72px;
  border-radius: 16px;
  margin-bottom: 16px;
}
p {
  font-size: 14px;
  opacity: 0.85;
  line-height: 1.6;
}
button {
  margin-top: 16px;
  padding: 12px 28px;
  font-size: 16px;
  border-radius: 999px;
  border: none;
  background: #38bdf8;
  color: #0f172a;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="wrap">
  <img src="icon-192.png" alt="">
  <p id="msg">กำลังเปิดแอป...</p>
  <button id="openBtn" style="display:none">เปิดแอป</button>
</div>
<noscript>
<p style="color:#f1f5f9">เปิด JavaScript เพื่อใช้งานแอป หรือ
<a style="color:#38bdf8" href="https://script.google.com/macros/s/AKfycbwtGF0VbeW1NE-GP71mILa-AMTXHVDZdRtQrRS11mH5kyYkwbqJvjoOnbzW-uRLV3oP/exec">คลิกที่นี่</a>
</p>
</noscript>
<script>
var APP_URL = "https://script.google.com/macros/s/AKfycbwtGF0VbeW1NE-GP71mILa-AMTXHVDZdRtQrRS11mH5kyYkwbqJvjoOnbzW-uRLV3oP/exec";

if (window.navigator.standalone) {
  window.location.replace(APP_URL);
} else {
  document.getElementById('msg').textContent = 'กด Share แล้วเลือก "เพิ่มไปยังหน้าจอโฮม" เพื่อติดตั้งไอคอน หรือแตะปุ่มด้านล่างเพื่อเปิดแอปตอนนี้';
  var btn = document.getElementById('openBtn');
  btn.style.display = 'inline-block';
  btn.onclick = function () { window.location.href = APP_URL; };
}
</script>
</body>
</html>
